# Squid config for the sandbox egress proxy: default-deny, allowlist-only.
#
# Only CONNECT to TLS ports, only to domains in allowlist.txt. Everything
# else is denied. Edit allowlist.txt (not this file) to permit more hosts.

http_port 3128

# Destinations the sandbox is allowed to reach (one per line; a leading dot
# matches subdomains). See allowlist.txt.
acl allowed_dst dstdomain "/etc/squid/allowlist.txt"

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Block CONNECT tunnels to anything but TLS ports.
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

# Allow only allowlisted destinations; deny the rest.
http_access allow allowed_dst
http_access deny all

# Don't advertise the proxy / client to upstreams.
forwarded_for delete
via off
httpd_suppress_version_string on
