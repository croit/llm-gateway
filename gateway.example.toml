# gateway.example.toml — copy to `gateway.toml` for local development, or
# point `$GATEWAY_CONFIG` at this file.

[bind]
host = "127.0.0.1"
port = 8080

[db]
path = "gateway.sqlite"

[gateway]
public_url = "http://localhost:8080"
token_ttl_days = 90
session_key_env = "GATEWAY_SESSION_KEY"
# Let admins impersonate other users from /admin/users (debugging aid; every
# impersonation is audited and shows a persistent banner). Default false
# (opt-in) — it's a privileged capability, so it's off unless you enable it
# here. While disabled the Impersonate buttons are hidden and the
# POST /admin/users/impersonate endpoint returns 403. Stopping an already-active
# impersonation still works regardless.
allow_impersonation = false

# ---- Usage metrics ---------------------------------------------------------
# Per-user / per-backend request + token accounting, surfaced at /usage (and
# the per-backend sparkline on /admin/backends). Recording is decoupled from
# the request path (a bounded channel drained by a batched background writer),
# so it adds negligible load — but it's a production kill switch if you ever
# need it: set `enabled = false` to stop all measurement (no writer task, no
# per-request work) and keep serving. The block is optional; these are the
# defaults.
[usage]
enabled = true
# Days of raw per-request rows to keep (pruned hourly); daily rollups are kept
# forever regardless. Keep this above ~62 so the "last month" view stays exact.
retention_days = 90

# ---- Upstream pools --------------------------------------------------------
# Each [upstream_pools.<name>] block defines a logical pool of backends that
# serve the same kind of model (chat, transcription, embedding). The picker
# strategy chooses one healthy backend per request:
#   - round_robin     (default rotation)
#   - least_inflight  (prefers the least-loaded backend; recommended)

[upstream_pools.local_chat]
kind = "chat"
strategy = "least_inflight"

[[upstream_pools.local_chat.backend]]
name = "gpu-01"
base_url = "http://gpu-01.internal:8000/v1"
# api_key_env = "GPU01_KEY"   # uncomment if the backend needs a bearer
max_inflight = 16
weight = 1

[[upstream_pools.local_chat.backend]]
name = "gpu-02"
base_url = "http://gpu-02.internal:8000/v1"
max_inflight = 16
weight = 1

# Optional data-handling flags for every model this pool serves. Both default
# to true (compliant) — omit the block entirely and nothing changes. Set a flag
# to false to surface an advisory warning in the chat UI (a dropdown-label
# suffix + a red banner shown before any prompt). Purely informational: it does
# NOT block or inspect requests. Use for non-EU / third-party providers, e.g.:
#   [upstream_pools.zai.compliance]
#   gdpr = false   # data leaves the EU / no GDPR safeguards → warn: no personal data
#   nda  = false   # not covered by a confidentiality agreement → warn: no NDA material

# Second pool for Whisper-style transcription. /v1/audio/transcriptions
# routes here when the request's `model` field is advertised by any
# backend in a transcription-kind pool.
# [upstream_pools.local_whisper]
# kind = "transcription"
# strategy = "round_robin"
# # Fallback model ids for backends that don't expose a usable `/models`
# # endpoint (e.g. a Voxtral realtime server). Advertised in /v1/models and
# # used for routing only while the probe reports nothing. Can also be set
# # per-backend (below), which takes precedence over this pool-level list.
# models = ["mistralai/Voxtral-Mini-4B-Realtime-2602"]
#
# [[upstream_pools.local_whisper.backend]]
# name = "whisper-01"
# base_url = "http://whisper-01.internal:9000/v1"
# health_path = "/models"   # Whisper-only servers may need a different path
# # models = ["whisper-1"]  # per-backend fallback; overrides the pool list

# ---- Model → pool routing --------------------------------------------------
# No static route table. The health probe hits each backend's `/models`
# endpoint every 5 s, parses the OpenAI envelope (`{"data":[{"id":...}]}`),
# and routes by what each backend reports. Load a model on a backend in
# the right kind of pool and it becomes routable automatically — no
# config edit required. (Run /v1/models or check the chat picker to see
# what the gateway has discovered.)
#
# Model id resolution precedence per backend, highest first:
#   1. what the backend's `/models` probe reports (authoritative);
#   2. that backend's `models = [...]` (a fallback, more specific);
#   3. the pool's `models = [...]` (a fallback, least specific).
# The first non-empty source wins, so config is a fallback for backends that
# can't self-report — not a supplement to a live probe.
#
# /v1/models lists EVERY model across ALL pools/kinds (chat + transcription +
# embedding), de-duplicated by id — OpenAI parity; clients select by id.

# ---- OIDC ------------------------------------------------------------------
# Required for /auth/login and `gw auth login` to work.

# [oidc]
# issuer = "https://id.example.com/realms/company"
# client_id = "llm-gateway"
# client_secret_env = "GATEWAY_OIDC_CLIENT_SECRET"
# scopes = ["email", "profile", "groups"]
# roles_claim = "groups"

# ---- RBAC ------------------------------------------------------------------
# Map OIDC claim values to internal role IDs, and declare what each role can
# access. The default_role applies to every authenticated user.

# [rbac]
# default_role = "user"
#
# [[rbac.mapping]]
# oidc_claim = "groups"
# oidc_value = "engineering"
# role = "engineering"
#
# [[rbac.mapping]]
# oidc_claim = "groups"
# oidc_value = "admin"
# role = "admin"

# [[roles]]
# id = "user"
# models = ["*"]
# tools = []
#
# [[roles]]
# id = "engineering"
# models = ["*"]
# # Grant `enable_tools` (always-on core) so the model can turn on extra
# # tool groups mid-conversation — see docs/tool-context-optimization.md.
# tools = ["enable_tools", "get_current_timestamp", "get_user_location", "remember", "recall",
#          "create_document", "edit_document", "read_document", "list_documents"]
# # Skill names this role may load (see [skills] below). "*" = all loaded
# # skills; omit/empty to grant none. Requires the `read_skill` tool too,
# # which `tools = ["*"]` covers.
# skills = ["croit-brand-guardian"]
#
# [[roles]]
# id = "admin"
# # `admin = true` is what unlocks the admin UI (`/admin/*`) and admin-only
# # actions — the gate keys off this flag, NOT the role name, so you can call
# # the role whatever you like and even flag more than one. Defaults to false;
# # a role without it never grants admin, even if named "admin".
# admin = true
# models = ["*"]
# tools = ["*"]
# skills = ["*"]

# ---- Chat attachments (S3) -------------------------------------------------
# The chat composer accepts any file (paperclip / drag-drop / clipboard
# paste). Each upload lands at `<key_prefix>/<turn_id>/<filename>` in the
# bucket; the gateway then presigns a GET URL (1 h TTL) rooted at the
# same endpoint and hands that to the upstream LLM as `image_url`
# content (for images) or alongside a `[gw-attachment …]` marker (for
# everything else, with text/* and known data formats also inlined as a
# fenced block). Bucket stays private; no public-read ACL needed.
#
# Capability gating is intentionally NOT done here — operators are
# expected to point [upstream_pools] at multi-modal chat models only;
# any model/attachment mismatch surfaces as the upstream's own error.
#
# Past-turn attachments are stripped from the replayed history (kept as
# brief `[attached: name.ext (omitted)]` stubs) so a long conversation
# never blows up the context window.

# [chat.s3]
# # `endpoint` is both the upload host AND the presigned-URL root, so
# # it must be reachable from the upstream LLM's network (not just the
# # gateway's). Path-style requests are always used.
# endpoint        = "https://s3.eu-central-1.amazonaws.com"
# region          = "eu-central-1"
# bucket          = "my-gateway-attachments"
# # Env-var NAMES (not the secret values themselves — same pattern as
# # session_key_env / client_secret_env).
# access_key_env  = "GATEWAY_S3_ACCESS_KEY"
# secret_key_env  = "GATEWAY_S3_SECRET_KEY"
# # Object key prefix inside the bucket. Optional; defaults to
# # "chat-attachments". Useful when the bucket is shared with other
# # workloads.
# # key_prefix    = "chat-attachments"

# ---- Typst templates -------------------------------------------------------
# Per-template tools (`typst_<id>`) the model can call to render
# PDFs/letters/presentations in your corporate design. The gateway
# scans `templates_dir` at startup; each subdirectory containing a
# `template.toml` manifest (and the `template.typ` it points at)
# becomes one tool. Field schemas in the manifest become the tool's
# JSON schema, so the model sees exact field names / types.
#
# The `typst` CLI must be on PATH for the rendered output to be
# produced; if it isn't, the tools still register but every call
# returns a clean error.
#
# See `examples/typst-templates/letter/` in the repo for a working
# template + manifest pair to copy.
#
# The container image bakes the in-repo templates to `/opt/typst-templates`
# (see Dockerfile), so the templates ship and version with the binary. Point
# `templates_dir` there and DON'T bind-mount a host dir over `/opt/typst-templates`
# — a stale host copy shadows the baked-in templates and silently pins an old
# design. Use a host mount only if you deliberately maintain templates out-of-band.

# [typst]
# templates_dir = "/opt/typst-templates"

# ---- Agent Skills ----------------------------------------------------------
# Operator-installed instruction bundles the chat model loads on demand via
# the `read_skill` tool — brand guidelines, house style, domain playbooks.
# Each skill's name + description is advertised to the model in its system
# context (cheap metadata); when a request matches, the model pulls the full
# SKILL.md body, and any referenced `references/`/`assets/` file (e.g. an SVG
# logo it inlines into an HTML answer).
#
# Drop bundles into `dir` and restart (no hot-reload). A bundle is either a
# directory holding a `SKILL.md`, or a `*.skill` zip of one (extracted into
# `<dir>/.cache/` at startup). With no valid bundle the `read_skill` tool
# isn't even registered.
#
# RBAC-gated per role via each role's `skills` list (see [[roles]] above) —
# exactly like `tools`. A role sees only the skills it's granted.

# [skills]
# dir = "/opt/skills"

# ---- GeoIP -----------------------------------------------------------------
# Lets the `get_user_location` tool resolve a caller's source IP to a
# coarse city/country (so the assistant can answer "weather here?" without
# the user naming a city). Uses an IP2Location LITE DB11 `.BIN`.
#
# Entirely optional: with no `[geoip]` block — or with the file missing —
# the gateway boots and runs unchanged; the tool just falls back to a
# browser-shared position (or reports the location as unknown).
#
# The `.BIN` is hot-reloaded: drop a new file at `db_path` (or let the
# weekly updater do it) and the running gateway picks it up without a
# restart. `update_token_env` names the env var holding an IP2Location
# download token (register a free LITE account at ip2location.com); when
# set, a weekly background task refreshes `db_path`. Leave it unset to
# manage the file yourself.

# [geoip]
# db_path          = "data/ip2location/IP2LOCATION-LITE-DB11.BIN"
# update_token_env = "IP2LOCATION_TOKEN"

# ---- Code-execution sandbox ------------------------------------------------
# Registers the `run_in_sandbox`, `generate_document`, `capture_webpage`,
# `convert_document`, and `edit_presentation` tools, which let the model run
# Python/shell, build documents, capture web pages, and work on files the user
# uploaded (convert a deck to PDF/images, edit a .pptx via python-pptx) inside a
# single-use, strongly-isolated sandbox. Uploaded files reach the sandbox
# server-side: the current turn's uploads are staged into the working directory
# automatically, and the model can pull in files from earlier in the
# conversation by attachment id (needs `[chat.s3]`). The heavy lifting
# (gVisor isolation, warm pool, default-deny egress allowlist) lives in
# the separate `sandbox-runner` service — see docs/sandbox.md for the full
# setup (gVisor install, Quadlets, egress proxy). With no `[sandbox]` block the
# tools aren't registered and the gateway is unchanged.
#
# `runner_url` MUST be reachable only from the gateway (internal network /
# mTLS) — the runner executes arbitrary code. Produced files are returned as
# chat attachments in the UI, and as bearer-authed download URLs
# (`/v1/sandbox/files/...`, scoped to the caller) on the API path; both need
# `[chat.s3]` configured.

# [sandbox]
# enabled           = true       # master switch; false keeps the block but disables the tools
# runner_url        = "http://10.88.0.1:9000"  # host runner on the podman bridge gateway IP (no gateway network change needed)
# timeout_secs      = 120        # HTTP timeout for one /run call
# max_artifact_bytes = 26214400  # 25 MiB — larger produced files are dropped

# ---------------------------------------------------------------------------
# External MCP (Model Context Protocol) servers.
#
# Each `[[mcp.servers]]` is connected at startup and its tools appear in chat
# (and on /tools, grouped under "Integrations") as `mcp__<name>__<tool>`.
# Optional: with no `[mcp]` block the gateway exposes only its built-in tools.
# A server that's unreachable at boot is logged and skipped — it never blocks
# startup. Exactly one transport per server:
#
#   * stdio — `command` (+ optional `args` / `env`) spawns the server as a
#     subprocess. The child inherits the gateway's environment. NOTE: the
#     deploy image is minimal (no node/python), so stdio is mainly for local
#     dev; in production prefer http to a server running as its own container.
#   * http  — `url` is the server's streamable-HTTP endpoint. Authenticate
#     with `bearer_token_env` (names an env var holding the raw token; sent as
#     `Authorization: Bearer <token>`) and/or literal `headers` (e.g. an
#     `X-Api-Key`). Keep secrets in the environment via `bearer_token_env`.

# [[mcp.servers]]
# name    = "files"                       # → tools mcp__files__*
# command = "npx"
# args    = ["-y", "@modelcontextprotocol/server-filesystem", "/data"]

# [[mcp.servers]]
# name            = "acme"                # → tools mcp__acme__*
# url             = "https://mcp.acme.example/mcp"
# bearer_token_env = "ACME_MCP_TOKEN"     # → Authorization: Bearer <$ACME_MCP_TOKEN>
# headers         = { X-Tenant = "acme" }

# --- RAG (retrieval-augmented generation) ------------------------------
# Operator-managed indexed codebases. Collections are added via the /rag
# page (admin-only) or POST /api/v0/rag/collections; the gateway clones
# them, chunks every file, embeds each chunk through one of the
# `kind = "embedding"` pools above, and stores vectors in a per-collection
# usearch file on disk. The `rag_search` + `rag_list_collections` tools
# expose these collections to the chat model.
#
# `data_dir` MUST live on a writable filesystem. The container image
# ships with a read-only rootfs (see deploy/quadlet/gateway.container ->
# ReadOnly=true), so the default `data/rag` ONLY works for local dev.
# Production: point this at a subdirectory of the same named volume that
# backs [db].path (e.g. /var/lib/gateway/rag) so the index files + clone
# cache survive image swaps.
# [rag]
# data_dir = "/var/lib/gateway/rag"

# --- Feedback widget ---------------------------------------------------
# A floating "feedback" button on every signed-in page. It opens a form
# (Title / Description / Business value / Acceptance criteria / Priority),
# auto-captures a viewport screenshot, and optionally fills the fields from
# a voice recording (recorded in-browser, transcribed via the gateway's own
# transcription pool, then structured by a chat model). On submit the
# gateway files a GitHub issue in the repo below, embedding the screenshot.
#
# Omit this whole block to disable the feature (the button stays hidden).
# The token may live inline here (as below) or in an env var via
# `github_token_env`; the inline value wins when both are set.
# [feedback]
# github_owner      = "croit"            # GitHub repo owner (user or org)
# github_repo       = "llm-gateway"      # GitHub repo name
# github_token      = "ghp_xxx"          # PAT with issues:write (+ contents:write for screenshots)
# # github_token_env = "GATEWAY_FEEDBACK_GITHUB_TOKEN"  # alternative: name of an env var
# labels            = ["feedback"]                      # added to every issue (+ priority:<p>)
# assets_branch     = "feedback-assets"  # orphan branch holding embedded screenshots
# # Model choice is an OPERATOR setting — the feedback form never shows a picker.
# extraction_model  = ""                 # "text model": chat model for voice→fields; empty = first available chat model
# voice_model       = ""                 # "voice model": transcription model for the recording; empty = first available transcription model
# github_api_base   = "https://api.github.com"          # override for GitHub Enterprise
