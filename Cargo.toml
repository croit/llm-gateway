regex = "1"

# In-process vector index for the RAG subsystem. Unum's usearch — a
# single-header C++ HNSW served via a thin Rust wrapper; the crate's
# build.rs compiles the C++ into the binary, so no runtime .so / .dylib
# and no network at build time. One index file per collection, mmap'd
# on open. `default-features = false` drops the `numkong` SIMD helper
# (its FP8 / SME-dispatch C files segfault Apple-Silicon clang); usearch
# falls back to its built-in distance kernels, which is plenty for our
# scale (codebase RAG, tens of thousands of chunks per collection).
usearch = { version = "2.25", default-features = false }
